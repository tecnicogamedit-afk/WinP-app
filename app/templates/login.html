<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>WinP - Accesso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stile.css') }}">
</head>
<body class="pagina-login">
    <div class="login-contenitore">
        <div class="login-intestazione">
            <h1 class="login-titolo">WinP</h1>
            <p class="login-sottotitolo">Sistema di gestione commesse</p>
        </div>
        {% if errore %}
        <div class="login-errore">{{ errore }}</div>
        {% endif %}
        <form action="" method="POST">
            <div class="campo-gruppo">
                <label class="campo-etichetta">Nome</label>
                <select class="campo-select" name="utente_id" required>
                    <option value="">- Seleziona il tuo nome -</option>
                    {% for utente in utenti %}
                    <option value="{{ utente.id }}">{{ utente.nome }} | {{ utente.reparto }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo-gruppo">
                <label class="campo-etichetta">Password</label>
                <input class="campo-input" type="text" name="password" placeholder="Lascia vuoto per accesso base">
            </div>
            <button class="btn-accedi" type="submit">Accedi</button>
        </form>
    </div>
</body>
</html>
