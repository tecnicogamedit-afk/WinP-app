{% extends "base.html" %}
<!--
    nuova_richiesta.html — Form per creare una nuova richiesta di quotazione.
    Accessibile solo al reparto Commerciale e Amministratore.
    
    CAMPI OBBLIGATORI: cliente, descrizione, data_richiesta
    CAMPI FACOLTATIVI: data_consegna, priorita, note_co
    
    Dopo il salvataggio torna alla dashboard.
    Il campo data_richiesta viene precompilato con la data di oggi
    tramite JavaScript ma è modificabile dall'utente.
-->

{% block titolo %}WinP — Nuova richiesta{% endblock %}

{% block contenuto %}

<div class="form-contenitore">

    <div class="form-intestazione">
        <div>
            <h1 class="form-titolo">Nuova richiesta di quotazione</h1>
            <p class="form-sottotitolo">
                Compila i campi e salva — il Tecnico riceverà la richiesta
            </p>
        </div>
        <a href="{{ url_for('main.dashboard') }}" class="btn-annulla">
            Annulla
        </a>
    </div>

    {% if errore %}
    <div class="form-errore">{{ errore }}</div>
    {% endif %}

    <form action="" method="POST">

        <!-- Cliente — obbligatorio -->
        <div class="campo-gruppo">
            <label class="campo-etichetta" for="cliente">
                Cliente <span class="campo-obbligatorio">*</span>
            </label>
            <input class="campo-input"
                   type="text"
                   id="cliente"
                   name="cliente"
                   placeholder="Nome cliente o azienda"
                   value="{{ form.cliente if form else '' }}"
                   required>
        </div>

        <!-- Descrizione lavoro — obbligatoria -->
        <div class="campo-gruppo">
            <label class="campo-etichetta" for="descrizione">
                Descrizione lavoro <span class="campo-obbligatorio">*</span>
            </label>
            <textarea class="campo-textarea"
                      id="descrizione"
                      name="descrizione"
                      rows="3"
                      placeholder="Descrivi brevemente il lavoro richiesto"
                      required>{{ form.descrizione if form else '' }}</textarea>
        </div>

        <!-- Data richiesta e Data consegna — sulla stessa riga -->
        <div class="campo-riga">

            <!-- Data richiesta — obbligatoria, precompilata con oggi -->
            <div class="campo-gruppo">
                <label class="campo-etichetta" for="data_richiesta">
                    Data richiesta <span class="campo-obbligatorio">*</span>
                </label>
                <input class="campo-input"
                       type="date"
                       id="data_richiesta"
                       name="data_richiesta"
                       value="{{ form.data_richiesta if form else '' }}"
                       required>
            </div>

            <!-- Data consegna — facoltativa, segnalata se mancante -->
            <div class="campo-gruppo">
                <label class="campo-etichetta" for="data_consegna">
                    Data consegna
                </label>
                <input class="campo-input"
                       type="date"
                       id="data_consegna"
                       name="data_consegna"
                       value="{{ form.data_consegna if form else '' }}">
            </div>

        </div>

        <!-- Priorità -->
        <div class="campo-gruppo">
            <label class="campo-etichetta" for="priorita">
                Priorità
            </label>
            <select class="campo-select"
                    id="priorita"
                    name="priorita">
                <option value="">— Nessuna —</option>
                <option value="ASAP"
                    {{ 'selected' if form and form.priorita == 'ASAP' }}>
                    ASAP (entro 24h)
                </option>
                <option value="Urgente"
                    {{ 'selected' if form and form.priorita == 'Urgente' }}>
                    Urgente (entro 48h)
                </option>
                <option value="Standard"
                    {{ 'selected' if form and form.priorita == 'Standard' }}>
                    Standard (entro 72h)
                </option>
            </select>
        </div>

        <!-- Note commerciale -->
        <div class="campo-gruppo">
            <label class="campo-etichetta" for="note_co">
                Note commerciale
            </label>
            <textarea class="campo-textarea"
                      id="note_co"
                      name="note_co"
                      rows="2"
                      placeholder="Note interne per il reparto Tecnico">{{ form.note_co if form else '' }}</textarea>
        </div>

        <div class="form-pulsanti">
            <a href="{{ url_for('main.dashboard') }}" class="btn-annulla">
                Annulla
            </a>
            <button type="submit" class="btn-salva">
                Salva richiesta
            </button>
        </div>

    </form>

</div>

<!--
    Precompila la data richiesta con oggi se il campo è vuoto.
    new Date().toISOString().split('T')[0] = data nel formato YYYY-MM-DD
    richiesto dall'input type="date"
-->
<script>
var campoData = document.getElementById('data_richiesta');
if (!campoData.value) {
    campoData.value = new Date().toISOString().split('T')[0];
}
</script>

{% endblock %}
